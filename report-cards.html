<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Card Comments — Grade 7</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f7f8fc;--surface:#fff;--border:#e4e7ec;--border2:#ced3dc;
      --text:#111827;--text2:#374151;--muted:#9ca3af;
      --primary:#4a6cf7;--primary-dark:#3a5ce5;--primary-light:#eef2ff;
      --danger:#ef4444;--danger-light:#fef2f2;--success:#10b981;
      --warn:#f59e0b;--hh:56px;
    }
    html.dark{
      --bg:#0f1117;--surface:#1a1d27;--border:#272a3a;--border2:#343848;
      --text:#e1e4ed;--text2:#b0b7c8;--muted:#5a6178;
      --primary:#6b83f8;--primary-dark:#5b73e8;--primary-light:#1a2040;
      --danger:#f87171;--danger-light:#2d1c1c;color-scheme:dark;
    }
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
    header{height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:10;gap:10px}
    .logo{font-size:1rem;font-weight:700;color:var(--primary);white-space:nowrap}
    .hdr-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
    .btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .12s}
    .btn:hover{background:var(--bg)}
    .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn.primary:hover{background:var(--primary-dark)}
    .btn.sm{padding:4px 9px;font-size:.74rem}
    .btn.danger{color:var(--danger);border-color:var(--danger-light);background:var(--danger-light)}
    .btn.danger:hover{background:var(--danger);color:#fff}
    .ibt{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;padding:5px 9px;font-size:1rem;line-height:1}
    .ibt:hover{background:var(--bg);color:var(--text)}

    .app{display:flex;height:calc(100vh - var(--hh));overflow:hidden}

    /* Sidebar */
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sb-head{padding:10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
    .sb-title{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
    .class-tabs{display:flex;gap:4px}
    .class-tab{flex:1;padding:5px 6px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;color:var(--muted);transition:all .14s}
    .class-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .upload-z{border:2px dashed var(--border2);border-radius:7px;padding:9px;text-align:center;cursor:pointer;font-size:.78rem;color:var(--muted);transition:border-color .14s,color .14s;line-height:1.4}
    .upload-z:hover{border-color:var(--primary);color:var(--primary)}
    .stu-list{flex:1;overflow-y:auto;padding:4px 0}
    .stu-item{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;font-size:.83rem;font-weight:500;transition:background .1s}
    .stu-item:hover{background:var(--bg)}
    .stu-item.active{background:var(--primary-light);color:var(--primary);font-weight:700}
    .stu-item .del{margin-left:auto;opacity:0;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.75rem;padding:1px 4px;border-radius:3px}
    .stu-item:hover .del{opacity:1}
    .stu-item .del:hover{background:var(--danger-light);color:var(--danger)}
    .avatar{width:26px;height:26px;border-radius:50%;background:var(--primary-light);color:var(--primary);font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .stu-item.active .avatar{background:var(--primary);color:#fff}
    .empty-p{padding:14px 10px;text-align:center;color:var(--muted);font-size:.79rem;line-height:1.5}

    /* Editor */
    .editor{flex:1;overflow-y:auto;padding:16px 20px 80px;min-width:0}
    .ed-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:10px}

    /* Student header */
    .stu-hdr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:12px;margin-bottom:13px}
    .stu-name{font-size:1.05rem;font-weight:700}
    .stu-sub{font-size:.76rem;color:var(--muted);margin-top:1px}
    .sel{padding:4px 7px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;color:var(--text);background:var(--bg);cursor:pointer;outline:none}
    .sel:focus{border-color:var(--primary)}

    /* Subject tabs */
    .stabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;overflow-x:auto;flex-shrink:0}
    .stab{padding:7px 13px;font-size:.81rem;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit;transition:color .14s}
    .stab:hover{color:var(--text)}
    .stab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .pchip{display:inline-block;margin-left:5px;font-size:.62rem;padding:1px 5px;border-radius:3px;font-weight:700;vertical-align:middle}

    /* ELA sub-tabs */
    .etabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px}
    .etab{padding:6px 12px;font-size:.79rem;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
    .etab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .etab:hover{color:var(--text)}

    /* Cards */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-bottom:1px solid var(--border);background:var(--bg)}
    .card-title{font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
    .card-body{padding:13px;display:flex;flex-direction:column;gap:11px}

    /* Note */
    .note{font-size:.77rem;background:var(--primary-light);border-radius:6px;padding:7px 10px;line-height:1.5;color:var(--text2)}

    /* Prof buttons */
    .prof-row{display:flex;gap:6px;flex-wrap:wrap}
    .pb{padding:5px 13px;border-radius:20px;border:2px solid var(--border);background:var(--surface);font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .14s}
    .pb.aE{border-color:#ef4444;background:#fef2f2;color:#dc2626}
    .pb.aD{border-color:#f59e0b;background:#fffbeb;color:#b45309}
    .pb.aP{border-color:#10b981;background:#ecfdf5;color:#059669}
    .pb.aEx{border-color:#6366f1;background:#eef2ff;color:#4f46e5}

    /* Competency chips */
    .comp-grid{display:flex;flex-direction:column;gap:5px}
    .comp-item{display:flex;align-items:flex-start;gap:7px}
    .comp-item input{margin-top:3px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
    .comp-item label{font-size:.81rem;cursor:pointer;line-height:1.4;color:var(--text2)}
    .comp-hint{font-size:.7rem;margin-top:3px}
    .comp-hint.ok{color:var(--success)}
    .comp-hint.warn{color:var(--warn)}

    /* Selected competencies display */
    .comp-display{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:.8rem;line-height:1.7;color:var(--text2);min-height:36px}
    .comp-display em{color:var(--muted);font-style:italic}

    /* Phrase picker */
    .phrase-row{display:flex;gap:7px}
    .psel{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:.81rem;font-family:inherit;color:var(--text);background:var(--bg);cursor:pointer;outline:none}
    .psel:focus{border-color:var(--primary)}
    .tag-list{display:flex;flex-direction:column;gap:4px}
    .tag{display:flex;align-items:flex-start;gap:6px;font-size:.79rem;border-radius:5px;padding:4px 8px}
    .tag.str{background:var(--primary-light);color:var(--primary)}
    .tag.grw{background:#ecfdf5;color:#059669}
    html.dark .tag.grw{background:#052e1a;color:#34d399}
    .tag span{flex:1;line-height:1.35}
    .tag button{background:none;border:none;cursor:pointer;color:currentColor;opacity:.6;font-size:.72rem;padding:0 2px;flex-shrink:0;margin-top:1px}
    .tag button:hover{opacity:1}

    /* P&G phrase groups */
    .pg-group{display:flex;flex-direction:column;gap:5px}
    .pg-group-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:2px}
    .pg-check{display:flex;align-items:flex-start;gap:7px;padding:4px 0}
    .pg-check input{margin-top:3px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
    .pg-check label{font-size:.81rem;cursor:pointer;line-height:1.4;color:var(--text2)}

    /* Fields */
    .fg{display:flex;flex-direction:column;gap:4px}
    .fl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
    .fi{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:.82rem;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
    .fi:focus{border-color:var(--primary);background:var(--surface)}
    .ta{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:.84rem;font-family:inherit;color:var(--text);background:var(--bg);outline:none;resize:vertical;line-height:1.6}
    .ta:focus{border-color:var(--primary);background:var(--surface)}
    .ta.preview{min-height:130px;border-color:var(--primary);background:var(--surface)}
    .ta.ctx{min-height:70px}
    .ta.short{min-height:60px}

    .cmt-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
    .cc{font-size:.71rem;color:var(--muted)}
    .cpok{font-size:.71rem;color:var(--success);opacity:0;transition:opacity .3s}
    .cpok.show{opacity:1}

    /* Export bar */
    .expbar{position:fixed;bottom:0;left:220px;right:0;background:var(--surface);border-top:1px solid var(--border);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:5}
    .expinfo{font-size:.8rem;color:var(--muted)}

    /* Modal */
    .mbk{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
    .mbk.open{display:flex}
    .modal{background:var(--surface);border-radius:12px;padding:20px;width:360px;max-width:95vw;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal-title{font-size:.96rem;font-weight:700}
    .mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    ::-webkit-scrollbar-track{background:transparent}
  </style>
</head>
<body>

<header>
  <div class="logo">📝 Report Card Comments — Grade 7</div>
  <div class="hdr-r">
    <button class="btn" onclick="dlTemplate()">⬇ Excel Template</button>
    <a href="index.html" style="text-decoration:none"><button class="btn">📅 Planner</button></a>
    <button class="ibt" onclick="toggleDark()">◑</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Classes</div>
      <div class="class-tabs" id="class-tabs"></div>
      <div class="upload-z" onclick="document.getElementById('xli').click()">
        📂 Import Excel
        <div style="font-size:.71rem;margin-top:2px;opacity:.8">roster or template</div>
      </div>
      <input type="file" id="xli" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(this)"/>
      <button class="btn sm" onclick="openAddStudent()">+ Add student</button>
    </div>
    <div class="stu-list" id="stu-list"></div>
  </div>

  <div class="editor" id="editor">
    <div class="ed-empty">
      <div style="font-size:3rem">📋</div>
      <div style="font-weight:700;font-size:1rem">Select a student</div>
      <div style="font-size:.84rem;max-width:300px;line-height:1.5">Download the Excel template, fill in your class list with proficiency levels, then import it here.</div>
    </div>
  </div>
</div>

<div class="expbar" id="expbar" style="display:none">
  <span class="expinfo" id="expinfo"></span>
  <div style="display:flex;gap:7px">
    <button class="btn" onclick="exportStudent()">⬇ This Student (.doc)</button>
    <button class="btn" onclick="exportAll('student')">⬇ All — By Student (.doc)</button>
    <button class="btn primary" onclick="exportAll('subject')">⬇ All — By Subject (.doc)</button>
  </div>
</div>

<!-- Add student modal -->
<div class="mbk" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add Student</div>
    <div class="fg"><div class="fl">First Name</div><input class="fi" id="af" type="text" placeholder="e.g. Jordan"/></div>
    <div class="fg"><div class="fl">Last Name</div><input class="fi" id="al" type="text" placeholder="e.g. Smith"/></div>
    <div class="fg"><div class="fl">Pronouns</div>
      <select class="fi sel" id="ap"><option value="they">They / Them</option><option value="she">She / Her</option><option value="he">He / Him</option></select>
    </div>
    <div class="fg"><div class="fl">Class</div>
      <select class="fi sel" id="ac"><option value="hr">Homeroom</option><option value="sw">Switch</option></select>
    </div>
    <div class="mactions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const PR = {
  he:   {sub:'He',  obj:'him', pos:'his', lsub:'he'},
  she:  {sub:'She', obj:'her', pos:'her', lsub:'she'},
  they: {sub:'They',obj:'them',pos:'their',lsub:'they'},
};
const PROF     = {E:'Emerging',D:'Developing',P:'Proficient',Ex:'Extending'};
const PROF_COL = {E:'#ef4444',D:'#f59e0b',P:'#10b981',Ex:'#6366f1'};

const DEFAULT_CLASSES = [
  {id:'hr', name:'Homeroom', subjects:['ela','math','ss','french','phe']},
  {id:'sw', name:'Switch',   subjects:['ss','french']},
];

// ── Proficiency definitions (verbatim from SD35 guide) ────────────────────────
function profDef(name, prof, subLabel) {
  if (prof==='Ex') return `${name} demonstrated an extending understanding of the ${subLabel} competencies covered this term. "Extending" is a student demonstrating learning, in relation to Learning Standards, with increasing depth and complexity.`;
  if (prof==='P')  return `${name} demonstrated a proficient understanding of the ${subLabel} competencies covered this term. "Proficient" is the standard goal for all students. It is when a student demonstrates the expected learning in relation to the Learning Standards of the curriculum.`;
  if (prof==='D')  return `${name} demonstrated a developing understanding of the ${subLabel} competencies covered this term. "Developing" indicates that a student is demonstrating learning in relation to the Learning Standards with growing consistency. ${name} is showing initial understanding but is still in the process of developing ${name}'s competency in relation to the Learning Standards of the curriculum.`;
  if (prof==='E')  return `${name} demonstrated an emerging understanding of the ${subLabel} competencies covered this term. "Emerging" indicates that a student is just beginning to demonstrate learning in relation to the Learning Standards of the curriculum, but is not yet doing so consistently.`;
  return '';
}

// ── Subject data ──────────────────────────────────────────────────────────────
const SUB = {
  ela_reading:{

      'Recognize and appreciate the role of story, narrative, and oral tradition in expressing First Peoples perspectives',
      'Understand how literary elements, techniques, and devices enhance and shape meaning',
      'Identify how different texts reflect different purposes and audiences',
    ],
    strengths:[
      'identifies main ideas and key details with confidence across a range of texts',
      'makes thoughtful and insightful text-to-self, text-to-text, and text-to-world connections',
      'uses context clues and vocabulary strategies effectively to make meaning from challenging texts',
      'analyses how an author\'s literary devices and word choice contribute to meaning and effect',
      'draws well-supported inferences using specific evidence from the text',
      'reads fluently and with expression across a variety of genres',
      'asks perceptive questions that deepen understanding of texts',
    ],
    growth:[
      'continue developing strategies for reading and independently interpreting more complex texts',
      'practise making and justifying inferences by citing specific textual evidence',
      'work on identifying and explaining the author\'s purpose, point of view, and craft across a range of text forms',
      'build vocabulary through wide and varied reading and by exploring word roots and context clues',
      'deepen comprehension by pausing regularly to summarize, question, and make connections while reading',
    ],
    ctx:'Describe what the class studied in Reading this term (novel, short stories, comprehension strategies…)',
  },
  ela_writing:{
    label:'ELA 7 — Writing', short:'English Language Arts',
    competencies:[
      'Use writing and design processes to plan, develop, and create engaging and meaningful texts',
      'Express and support personal opinions and ideas through a variety of writing forms',
      'Develop and apply knowledge of language features, forms, and conventions',
      'Transform ideas and information to create original texts',
      'Think critically, creatively, and reflectively to explore ideas in writing',
    ],
    strengths:[
      'crafts writing that is purposeful, organized, and clearly focused on the audience',
      'uses vivid, precise language and thoughtful word choice to engage the reader',
      'develops ideas with specific details, examples, and well-chosen supporting evidence',
      'demonstrates a distinct and authentic voice in personal and creative writing',
      'applies grammar, punctuation, and spelling conventions accurately and consistently',
      'structures writing with clear introductions, developed body paragraphs, and effective conclusions',
      'revises and edits writing thoughtfully to strengthen clarity, detail, and expression',
    ],
    growth:[
      'continue developing elaboration skills by adding specific details and explanation to ideas',
      'work on varying sentence structure and length to improve the flow and impact of writing',
      'practise applying grammar, spelling, and punctuation conventions consistently across all writing',
      'strengthen organizational structure by working on effective transitions and logical flow',
      'develop revision strategies to improve clarity, voice, and depth of ideas',
    ],
    ctx:'Describe what the class worked on in Writing this term (paragraphs, essays, creative writing…)',
  },
  ela_oral:{
    label:'ELA 7 — Oral Language', short:'English Language Arts',
    competencies:[
      'Communicate clearly and purposefully for a range of purposes and audiences',
      'Listen actively and respectfully to understand others\' perspectives',
      'Collaborate constructively in discussions and group work',
      'Select and use strategies for effective spoken communication',
      'Speak with increasing confidence, fluency, and expression',
    ],
    strengths:[
      'communicates ideas clearly, confidently, and with a strong sense of audience',

      'presents information in a well-organized and engaging manner',
      'demonstrates strong active listening skills and asks thoughtful follow-up questions',
    ],
    growth:[
      'continue building confidence in sharing and elaborating on ideas in whole-class settings',
      'work on expanding responses to include more specific detail, reasoning, and evidence',
      'practise active listening strategies — including paraphrasing and asking follow-up questions',
      'develop skills in organizing and presenting ideas clearly and with confidence to an audience',
    ],
    ctx:'Describe oral language activities this term (Socratic seminars, presentations, drama, reader\'s theatre…)',
  },
  math:{
    label:'Math 7', short:'Mathematics',
    competencies:[
      'Demonstrate and apply mental math strategies',
      'Develop, demonstrate, and apply mathematical understanding through play, inquiry, and problem solving',
      'Use reasoning and logic to explore, analyze, and apply mathematical ideas',
      'Model mathematics in contextualized experiences',
      'Estimate reasonably and demonstrate fluent, flexible thinking about number',
      'Use mathematical vocabulary and language to contribute to discussions',

    strengths:[

  },
  ss:{
    label:'Social Studies 7', short:'Social Studies',
    competencies:[

    strengths:[
      'demonstrates genuine curiosity and deep engagement with the historical concepts studied this term',

    growth:[

    ctx:'Describe the topics covered in Social Studies this term…',
  },
  french:{
    label:'French 7', short:'French',
    competencies:[
      'Construct meaning from French language texts for a variety of purposes and audiences',
      'Communicate in French for a variety of purposes and audiences',
      'Develop and apply knowledge of French language features, forms, and conventions',
      'Exchange ideas and information in French',
      'Engage in listening and speaking activities to enhance oral fluency',
    ],

// ── State ─────────────────────────────────────────────────────────────────────
let students   = JSON.parse(localStorage.getItem('rc_students') || '[]');
let comments   = JSON.parse(localStorage.getItem('rc_comments') || '{}');
let classCtx   = JSON.parse(localStorage.getItem('rc_ctx')      || '{}');
let activeId   = null;
let activeSubj = 'ela';
let activeEla  = 'reading';
let activeClass= localStorage.getItem('rc_class') || 'hr';
let dark       = localStorage.getItem('rc_dark')  === '1';

if (dark) document.documentElement.classList.add('dark');

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const genId= () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const pr   = sid => { const s=getStudent(sid); return PR[s?.pronouns]||PR.they; };
const getStudent = id => students.find(s=>s.id===id);

function save()    { localStorage.setItem('rc_students',JSON.stringify(students)); localStorage.setItem('rc_comments',JSON.stringify(comments)); }
function saveCtx() { localStorage.setItem('rc_ctx',JSON.stringify(classCtx)); }

function getClass(id) { return DEFAULT_CLASSES.find(c=>c.id===id)||DEFAULT_CLASSES[0]; }

function initStudent(sid) {
  if (!comments[sid]) comments[sid]={};
  const keys = ['ela_reading','ela_writing','ela_oral','math','ss','french','phe'];
  keys.forEach(k => {
    if (!comments[sid][k]) comments[sid][k]={proficiency:'',competencies:[],strengthPhrases:[],growthPhrases:[],adaptations:'',customText:'',special:''};
  });
  if (!comments[sid]['_pg']) comments[sid]['_pg']={habits:[],social:[],cc:[],support:[],customNote:'',customText:''};
}

function activeKey() {
  return activeSubj==='ela' ? 'ela_'+activeEla : activeSubj;
}

function classSubjects(classId) {
  return getClass(classId).subjects;
}

function studentSubjKeys(sid) {
  const s = getStudent(sid);
  const subs = classSubjects(s?.classId||'hr');
  const keys = [];
  if (subs.includes('ela')) keys.push('ela_reading','ela_writing','ela_oral');
  ['math','ss','french','phe'].forEach(k => { if (subs.includes(k)) keys.push(k); });
  return keys;
}

// ── Comment assembly ──────────────────────────────────────────────────────────
function assembleSubjectComment(sid, key) {
  const s   = getStudent(sid);
  if (!s) return '';
  const c   = comments[sid]?.[key]||{};
  const sub = SUB[key];
  if (!sub) return c.customText||'';

  const name = s.firstName;
  const p    = pr(sid);
  const prof = c.proficiency||'';
  const ctx  = (classCtx[key]||'').trim();
  const strs = c.strengthPhrases||[];
  const grws = c.growthPhrases||[];
  const adapt= (c.adaptations||'').trim();
  const spec = (c.special||'').trim();
  const parts= [];

  if (ctx) parts.push(ctx);
  if (prof) parts.push(profDef(name, prof, sub.short||sub.label));

  if (strs.length) {
    parts.push(strs.map((ph,i)=>`${i===0?p.sub:name} ${ph}.`).join(' '));
  }
  if (grws.length) {
    const gl = grws.length===1 ? grws[0]
      : grws.slice(0,-1).join(', ')+', and '+grws[grws.length-1];
    parts.push(`To further support ${name}'s growth in ${sub.short||sub.label}, I encourage ${p.obj} to ${gl}.`);
  }
  if (adapt) parts.push(adapt);
  if (spec)  parts.push(spec);
  return parts.join('\n\n');
}

function assemblePG(sid) {
  const c = comments[sid]?.['_pg'];
  if (!c) return '';
  const s    = getStudent(sid);
  const name = s?.firstName||'';
  const p    = pr(sid);

  const sel = {
    habits: (c.habits||[]),
    social: (c.social||[]),
    cc:     (c.cc||[]),
    support:(c.support||[]),
  };

  const parts = [];

  // Para 1: habits + social combined
  const p1parts = [];
  sel.habits.forEach(id => {
    const ph = PG.habits.find(x=>x.id===id);
    if (ph) p1parts.push(`${name} ${ph.t}.`);
  });
  sel.social.forEach(id => {
    const ph = PG.social.find(x=>x.id===id);
    if (ph) {
      const subj = p1parts.length===0 ? name : p.sub;
      p1parts.push(`${subj} ${ph.t}.`);
    }
  });

  // CC phrases
  sel.cc.forEach(id => {
    if (id==='c1') {
      p1parts.push(`Students have been collecting evidence of their learning through the Core Competencies throughout the year. Please see ${name}'s Spaces portfolio for ${p.pos} personal reflections and goal setting.`);
    } else if (id==='c2') {
      p1parts.push(`${name} has set a meaningful personal learning goal this term and is actively working towards it.`);
    } else {
      const ph = PG.cc.find(x=>x.id===id);
      if (ph) p1parts.push(ph.t.replace('[name]',name).replace('[pronoun]',p.obj));
    }
  });

  if (p1parts.length) parts.push(p1parts.join(' '));

  // Support bullets
  if (sel.support.length) {
    const bullets = sel.support.map(id => {
      const ph = PG.support.find(x=>x.id===id);
      return ph ? '• '+ph.t.replace(/\[name\]/g,name) : null;
    }).filter(Boolean);
    parts.push(`To support ${name}'s continued growth, I recommend:\n${bullets.join('\n')}`);
  }

  if (c.customNote?.trim()) parts.push(c.customNote.trim());
  return parts.join('\n\n');
}

function renderClassTabs() {

function renderStudentList() {
  const el = document.getElementById('stu-list');
  const filtered = students.filter(s=>(s.classId||'hr')===activeClass);
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-p">No students in this class yet. Add some or import an Excel file.</div>`;

  }
  el.innerHTML = filtered.map(s=>{
    const ini = (s.firstName[0]||'')+(s.lastName[0]||'');

function renderEditor() {
  const panel = document.getElementById('editor');
  const bar   = document.getElementById('expbar');
  if (!activeId) {
    panel.innerHTML = `<div class="ed-empty"><div style="font-size:3rem">📋</div><div style="font-weight:700;font-size:1rem">Select a student</div><div style="font-size:.84rem;max-width:300px;line-height:1.5">Download the Excel template, fill in your class list with proficiency levels, then import it here.</div></div>`;

    return;

  const s = getStudent(activeId);
  if (!s) { activeId=null; renderEditor(); return; }
  initStudent(activeId);
  bar.style.display='';
  document.getElementById('expinfo').textContent = `${students.filter(x=>(x.classId||'hr')===activeClass).length} students in ${getClass(activeClass).name} · ${s.firstName} ${s.lastName}`;

  const subs = classSubjects(s.classId||'hr');
  const tabDefs = [
    {key:'ela',  label:'ELA 7',            show:subs.includes('ela')},
    {key:'math', label:'Math 7',           show:subs.includes('math')},
    {key:'ss',   label:'Social Studies 7', show:subs.includes('ss')},
    {key:'french',label:'French 7',        show:subs.includes('french')},
    {key:'phe',  label:'PHE 7',            show:subs.includes('phe')},
    {key:'pg',   label:'Progress & Growth',show:true},
  ];

  function tabChip(k) {
    if (k==='pg') return '';
    if (k==='ela') {
      const ps = ['ela_reading','ela_writing','ela_oral'].map(ek=>comments[activeId]?.[ek]?.proficiency).filter(Boolean);
      if (ps.length===3) return `<span class="pchip" style="background:${PROF_COL[ps[0]]}22;color:${PROF_COL[ps[0]]}">R/W/O</span>`;
      return '';
    }

    return pf ? `<span class="pchip" style="background:${PROF_COL[pf]}22;color:${PROF_COL[pf]}">${PROF[pf]}</span>` : '';
  }

  const tabs = tabDefs.filter(t=>t.show).map(t=>
    `<button class="stab${activeSubj===t.key?' active':''}" onclick="switchSubj('${t.key}')">${t.label}${tabChip(t.key)}</button>`
  ).join('');

  panel.innerHTML = `
    <div class="stu-hdr">
      <div style="font-size:1.8rem">👤</div>
      <div style="flex:1">
        <div class="stu-name">${esc(s.firstName+' '+s.lastName)}</div>
        <div class="stu-sub">${esc(getClass(s.classId||'hr').name)} · ${s.pronouns==='they'?'They/Them':s.pronouns==='she'?'She/Her':'He/Him'}</div>

      <select class="sel" onchange="updatePronouns('${s.id}',this.value)">

        <option value="she"${s.pronouns==='she'?' selected':''}>She/Her</option>
        <option value="he"${s.pronouns==='he'?' selected':''}>He/Him</option>
      </select>
    </div>
    <div class="stabs">${tabs}</div>
    <div id="subj-body"></div>
    <div style="height:20px"></div>`;
  renderSubjBody();
}

function renderSubjBody() {
  const el = document.getElementById('subj-body');
  if (!el) return;
  if (activeSubj==='ela')    el.innerHTML = buildELA();
  else if (activeSubj==='pg') el.innerHTML = buildPG();
  else                        el.innerHTML = buildSubject(activeSubj);
}

function buildELA() {
  const tabs = ['reading','writing','oral'].map(t=>{
    const key = 'ela_'+t;
    const pf  = comments[activeId]?.[key]?.proficiency;
    const chip= pf?`<span class="pchip" style="background:${PROF_COL[pf]}22;color:${PROF_COL[pf]}">${PROF[pf]}</span>`:'';
    const lbl = {reading:'Reading',writing:'Writing',oral:'Oral Language'}[t];
    return `<button class="etab${activeEla===t?' active':''}" onclick="switchEla('${t}')">${lbl}${chip}</button>`;
  }).join('');
  return `<div class="card"><div class="card-head"><div class="card-title">ELA 7</div><div style="font-size:.72rem;color:var(--muted)">Separate comments required for all three areas</div></div>
  <div class="card-body"><div class="etabs">${tabs}</div>${buildCommentSection(activeId,'ela_'+activeEla)}</div></div>`;
}

function buildSubject(subj) {
  const sub = SUB[subj]; if (!sub) return '';
  return `<div class="card"><div class="card-head"><div class="card-title">${esc(sub.label)}</div></div>
  <div class="card-body">${buildCommentSection(activeId,subj)}</div></div>`;
}

function buildCommentSection(sid, key) {
  const sub  = SUB[key]; if (!sub) return '';
  const c    = comments[sid][key];
  const p    = pr(sid);
  const name = getStudent(sid).firstName;

  // Proficiency buttons
  const profBtns = Object.entries(PROF).map(([code,lbl])=>
    `<button class="pb${c.proficiency===code?' a'+code:''}" onclick="setProf('${sid}','${key}','${code}')">${lbl}</button>`
  ).join('');

  // Competency checkboxes
  const selC = c.competencies||[];
  const cnt  = selC.length;
  const cHint= cnt===0?'':(cnt<2?'warn':cnt<=5?'ok':'warn');
  const cMsg = cnt===0?'None selected — select 2–5':(cnt<2?cnt+' selected — need at least 2':cnt>5?cnt+' selected — try to keep to 5 or fewer':cnt+' selected ✓');

  const compHtml = sub.competencies.map((comp,i)=>`
    <div class="comp-item">
      <input type="checkbox" id="c${key}${i}" ${selC.includes(comp)?'checked':''} onchange="toggleComp('${sid}','${key}',${JSON.stringify(comp)},this.checked)"/>
      <label for="c${key}${i}">${esc(comp)}</label>
    </div>`).join('');

  // Selected competencies display
  const compDisplay = selC.length
    ? selC.map(c=>`<div>• ${esc(c)}</div>`).join('')
    : `<em>No competencies selected yet — check boxes above</em>`;

  // Strength tags
  const selStr = c.strengthPhrases||[];
  const selGrw = c.growthPhrases||[];
  const strTags = selStr.map(ph=>`<div class="tag str"><span>${esc(ph)}</span><button onclick="removePhrase('${sid}','${key}','str',${JSON.stringify(ph)})">✕</button></div>`).join('');
  const grwTags = selGrw.map(ph=>`<div class="tag grw"><span>${esc(ph)}</span><button onclick="removePhrase('${sid}','${key}','grw',${JSON.stringify(ph)})">✕</button></div>`).join('');

  const availStr = sub.strengths.filter(x=>!selStr.includes(x));
  const availGrw = sub.growth.filter(x=>!selGrw.includes(x));

  // Assembled comment (without competency list — that is shown separately)
  const assembled = c.customText || assembleSubjectComment(sid, key);

  return `
    <div class="fg">
      <div class="fl">Class Context <span style="color:var(--muted);font-weight:400">(shared for all students in this subject)</span></div>
      <textarea class="ta ctx" placeholder="${esc(sub.ctx||'')}" oninput="updateCtx('${key}',this.value)">${esc(classCtx[key]||'')}</textarea>
    </div>

    <div class="fg">
      <div class="fl">Proficiency Level</div>
      <div class="prof-row">${profBtns}</div>
    </div>

    <div class="fg">
      <div class="fl">Curricular Competencies <span style="color:var(--muted);font-weight:400">(select 2–5; appear at top of exported comment)</span></div>
      <div class="comp-grid">${compHtml}</div>
      <div class="comp-hint ${cHint}">${cMsg}</div>
      <div style="margin-top:6px">
        <div class="fl" style="margin-bottom:4px">Selected competencies (shown in comment export)</div>
        <div class="comp-display" id="cd-${key}">${compDisplay}</div>
      </div>
    </div>

    <div class="fg">
      <div class="fl">Strength Phrases</div>
      ${strTags?`<div class="tag-list">${strTags}</div>`:''}
      <div class="phrase-row">
        <select class="psel" id="ss-${key}"><option value="">— pick a strength phrase —</option>${availStr.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}</select>
        <button class="btn sm" onclick="addPhrase('${sid}','${key}','str','ss-${key}')">+ Add</button>
      </div>
    </div>

    <div class="fg">
      <div class="fl">Growth / Next Steps</div>
      ${grwTags?`<div class="tag-list">${grwTags}</div>`:''}
      <div class="phrase-row">
        <select class="psel" id="gs-${key}"><option value="">— pick a growth phrase —</option>${availGrw.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('')}</select>
        <button class="btn sm" onclick="addPhrase('${sid}','${key}','grw','gs-${key}')">+ Add</button>
      </div>
    </div>

    <div class="fg">
      <div class="fl">Adaptations &amp; Supports</div>
      <input class="fi" type="text" value="${esc(c.adaptations||'')}" placeholder="e.g. extended time; text-to-speech access" oninput="updateField('${sid}','${key}','adaptations',this.value)"/>
    </div>

    <div class="fg">
      <div class="fl">Special Circumstances</div>
      <select class="fi sel" style="width:100%" onchange="setSpecial('${sid}','${key}',this.value)">
        <option value="">— None —</option>
        <option value="iep"${c.special?.includes('IEP')?'  selected':''}>IEP Student</option>
        <option value="ell"${c.special?.includes('ELL')?'  selected':''}>ELL Student</option>
        <option value="new"${c.special?.includes('recently joined')?'  selected':''}>New Student (IE)</option>
      </select>
    </div>

    <div class="fg">
      <div class="fl" style="display:flex;justify-content:space-between">
        Comment (narrative — competencies exported separately above)
        <button class="btn sm" onclick="regen('${sid}','${key}')">↺ Regenerate</button>
      </div>
      <textarea class="ta preview" id="ta-${key}" oninput="updateCT('${sid}','${key}',this.value)">${esc(assembled)}</textarea>
      <div class="cmt-actions">
        <span class="cc" id="cc-${key}">${assembled.length} chars</span>
        <div style="display:flex;gap:6px;align-items:center"><span class="cpok" id="cp-${key}">✓ Copied</span><button class="btn sm" onclick="copyTA('ta-${key}','cp-${key}')">📋 Copy</button></div>
      </div>
    </div>`;
}

function buildPG() {
  const sid = activeId;
  const c   = comments[sid]['_pg'];

  function groupHtml(groupKey, label) {
    const phrases = PG[groupKey];
    const sel     = c[groupKey]||[];
    const items   = phrases.map(ph=>{
      let display = ph.t;
      if (ph.id==='c1') display = 'Reference Spaces portfolio for Core Competency reflections';
      else if (ph.id==='c2') display = 'Note that student has set a personal learning goal this term';
      else display = display.replace(/\[name\]/g,'[student name]');
      return `<div class="pg-check">
        <input type="checkbox" id="pg-${ph.id}" ${sel.includes(ph.id)?'checked':''} onchange="togglePG('${sid}','${groupKey}','${ph.id}',this.checked)"/>
        <label for="pg-${ph.id}">${esc(display)}</label>
      </div>`;
    }).join('');
    return `<div class="pg-group"><div class="pg-group-label">${label}</div>${items}</div>`;
  }

  const assembled = c.customText || assemblePG(sid);
  const s = getStudent(sid);

  return `<div class="card">
    <div class="card-head"><div class="card-title">Progress &amp; Growth + Ways to Support at Home</div></div>
    <div class="card-body">
      <div class="note">📌 Select phrases that apply to ${esc(s.firstName)}. The assembled comment combines work habits, social/emotional, Core Competencies, and support suggestions into one section.</div>
      ${groupHtml('habits','Work Habits')}
      ${groupHtml('social','Attitude &amp; Character')}
      ${groupHtml('cc','Core Competencies')}
      ${groupHtml('support','Ways to Support at Home')}
      <div class="fg">
        <div class="fl">Additional Personal Note <span style="color:var(--muted);font-weight:400">(optional)</span></div>
        <textarea class="ta short" id="pg-note" placeholder="Any extra personal comment, e.g. 'Well done this term! I look forward to seeing your growth next term.'" oninput="updatePGNote('${sid}',this.value)">${esc(c.customNote||'')}</textarea>
      </div>
      <div class="fg">
        <div class="fl" style="display:flex;justify-content:space-between">
          Assembled Comment
          <button class="btn sm" onclick="regenPG('${sid}')">↺ Regenerate</button>
        </div>
        <textarea class="ta preview" id="ta-_pg" oninput="updateCT('${sid}','_pg',this.value)">${esc(assembled)}</textarea>
        <div class="cmt-actions">
          <span class="cc" id="cc-_pg">${assembled.length} chars</span>
          <div style="display:flex;gap:6px;align-items:center"><span class="cpok" id="cp-_pg">✓ Copied</span><button class="btn sm" onclick="copyTA('ta-_pg','cp-_pg')">📋 Copy</button></div>
        </div>
      </div>
    </div>
  </div>`;
}

  activeClass = id;
  localStorage.setItem('rc_class', id);
  // deselect student if not in this class
  if (activeId && (getStudent(activeId)?.classId||'hr') !== id) activeId = null;
  renderClassTabs();
  renderStudentList();
  renderEditor();
}

function selectStudent(id) {
  activeId   = id;
  activeSubj = 'ela';
  activeEla  = 'reading';
  // Check if this student's class has ela
  const s    = getStudent(id);
  const subs = classSubjects(s?.classId||'hr');
  if (!subs.includes('ela')) {
    activeSubj = subs.includes('ss') ? 'ss' : subs[0] || 'pg';
  }
  renderStudentList();
  renderEditor();
  save();
}

function switchSubj(k)  { activeSubj=k; renderEditor(); }
function switchEla(t)   { activeEla=t; renderSubjBody(); }

function setProf(sid, key, prof) {
  comments[sid][key].proficiency = prof;
  comments[sid][key].customText  = '';
  save();
  renderEditor(); // re-render to update tab chip
}

function toggleComp(sid, key, comp, checked) {
  const arr = comments[sid][key].competencies;
  if (checked) { if (!arr.includes(comp)) arr.push(comp); }
  else         { comments[sid][key].competencies = arr.filter(x=>x!==comp); }
  comments[sid][key].customText = '';
  save();
  // Live-update the competency display box
  const el = document.getElementById('cd-'+key);
  if (el) {
    const selC = comments[sid][key].competencies;
    el.innerHTML = selC.length ? selC.map(c=>`<div>• ${esc(c)}</div>`).join('') : `<em>No competencies selected yet — check boxes above</em>`;
  }
  // Live-update the hint
  const cnt = comments[sid][key].competencies.length;
  const hints = document.querySelectorAll('.comp-hint');
  hints.forEach(h => {
    const cls = cnt===0?'':(cnt<2?'warn':cnt<=5?'ok':'warn');
    h.className = 'comp-hint '+cls;
    h.textContent = cnt===0?'None selected — select 2–5':(cnt<2?cnt+' selected — need at least 2':cnt>5?cnt+' selected — try to keep to 5 or fewer':cnt+' selected ✓');
  });
  refreshPreview(sid, key);
}

function addPhrase(sid, key, type, selId) {
  const sel = document.getElementById(selId);
  if (!sel?.value) return;
  const field = type==='str'?'strengthPhrases':'growthPhrases';
  const arr   = comments[sid][key][field];
  if (!arr.includes(sel.value)) arr.push(sel.value);
  comments[sid][key].customText = '';
  save();
  renderSubjBody();
}

function removePhrase(sid, key, type, phrase) {
  const field = type==='str'?'strengthPhrases':'growthPhrases';
  comments[sid][key][field] = comments[sid][key][field].filter(x=>x!==phrase);
  comments[sid][key].customText = '';
  save();
  renderSubjBody();
}

function updateField(sid, key, field, val) {
  comments[sid][key][field] = val;
  save();
}

function updateCtx(key, val) {
  classCtx[key] = val;
  saveCtx();
  if (activeId) refreshPreview(activeId, key);
}

function updateCT(sid, key, val) {
  comments[sid][key].customText = val;
  const cc = document.getElementById('cc-'+key);
  if (cc) cc.textContent = val.length+' chars';
  save();
}

function updatePronouns(sid, val) {
  const s = getStudent(sid);
  if (s) s.pronouns = val;
  Object.keys(comments[sid]||{}).forEach(k => { if (comments[sid][k]) comments[sid][k].customText=''; });
  save();
  renderSubjBody();
}

function setSpecial(sid, key, val) {
  const s    = getStudent(sid);
  const name = s?.firstName||'The student';
  const p    = pr(sid);
  const map  = {
    iep: `Please see ${name}'s Individualized Education Plan for further details on ${p.pos} progress and growth this term.`,
    ell: `${name} is learning English as an additional language and receives ELL support. ${p.sub} is making meaningful progress and demonstrates growing confidence in English communication.`,
    new: `${name} recently joined our class this term. It has been a pleasure getting to know ${p.obj}, but there has not been sufficient evidence to provide a full proficiency assessment for this subject. I look forward to working with ${p.obj} next term.`,
    '': '',
  };
  comments[sid][key].special    = map[val]||'';
  comments[sid][key].customText = '';
  save();
  renderSubjBody();
}

function togglePG(sid, groupKey, phraseId, checked) {
  const arr = comments[sid]['_pg'][groupKey]||[];
  if (checked) { if (!arr.includes(phraseId)) arr.push(phraseId); }
  else         { comments[sid]['_pg'][groupKey] = arr.filter(x=>x!==phraseId); }
  comments[sid]['_pg'].customText = '';
  save();
  refreshPGPreview(sid);
}

function updatePGNote(sid, val) {
  comments[sid]['_pg'].customNote  = val;
  comments[sid]['_pg'].customText  = '';
  save();
  refreshPGPreview(sid);
}

function refreshPreview(sid, key) {
  const ta = document.getElementById('ta-'+key);
  if (!ta) return;
  const text = assembleSubjectComment(sid, key);
  ta.value = text;
  const cc = document.getElementById('cc-'+key);
  if (cc) cc.textContent = text.length+' chars';
}

function refreshPGPreview(sid) {
  const ta = document.getElementById('ta-_pg');
  if (!ta) return;
  const text = assemblePG(sid);
  ta.value = text;
  const cc = document.getElementById('cc-_pg');
  if (cc) cc.textContent = text.length+' chars';
}

function regen(sid, key) {
  comments[sid][key].customText = '';
  save();
  renderSubjBody();
}

function regenPG(sid) {
  comments[sid]['_pg'].customText = '';
  save();
  renderSubjBody();
}

function copyTA(taId, confirmId) {
  const el   = document.getElementById(taId);
  const text = el?.value||'';
  navigator.clipboard.writeText(text).catch(()=>{
    const t = document.createElement('textarea');
    t.value = text; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
  });
  const c = document.getElementById(confirmId);
  if (c) { c.classList.add('show'); setTimeout(()=>c.classList.remove('show'),1600); }
}

// ── Student CRUD ──────────────────────────────────────────────────────────────
function openAddStudent() {
  document.getElementById('af').value = '';
  document.getElementById('al').value = '';
  document.getElementById('ac').value = activeClass;
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('af').focus(),50);
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
function confirmAdd() {
  const first = document.getElementById('af').value.trim();
  const last  = document.getElementById('al').value.trim();
  const pron  = document.getElementById('ap').value;
  const cls   = document.getElementById('ac').value;
  if (!first) return;
  students.push({id:genId(), firstName:first, lastName:last, pronouns:pron, classId:cls});
  save(); renderStudentList(); closeModal();
}
function deleteStudent(e, id) {
  e.stopPropagation();
  if (!confirm('Remove this student and all their comments?')) return;
  students = students.filter(s=>s.id!==id);
  delete comments[id];
  if (activeId===id) activeId=null;
  save(); renderStudentList(); renderEditor();
}

// ── Excel Import ──────────────────────────────────────────────────────────────
const PMAP = {'emerging':'E','e':'E','developing':'D','d':'D','proficient':'P','p':'P','extending':'Ex','ex':'Ex'};
const CMAP = {
  'ela reading':'ela_reading','reading':'ela_reading',
  'ela writing':'ela_writing','writing':'ela_writing',
  'ela oral':'ela_oral','oral':'ela_oral','oral language':'ela_oral',
  'math':'math','mathematics':'math',
  'social studies':'ss','ss':'ss','socials':'ss',
  'french':'french','français':'french','fr':'french',
  'phe':'phe','physical':'phe','physical and health education':'phe',
  'class':'_class',
};

function importExcel(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result,{type:'array'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if (!rows.length) return alert('No data found.');
      const header = rows[0].map(h=>String(h).toLowerCase().trim());
      let firstC=-1, lastC=-1, nameC=-1, pronC=-1;
      const profCols={}, classColIdx = header.indexOf('class');

      header.forEach((h,i)=>{
        if (h.includes('first')||h.includes('given')||h.includes('preferred')) firstC=i;
        if (h.includes('last')||h.includes('surname')||h.includes('family'))   lastC=i;
        if (h==='name'||h==='student name'||h==='student') nameC=i;
        if (h.includes('pronoun')) pronC=i;
        if (CMAP[h] && CMAP[h]!=='_class') profCols[CMAP[h]]=i;
      });

      let added=0;
      rows.slice(1).filter(r=>r.some(c=>String(c).trim())).forEach(row=>{
        let firstName='',lastName='',pronouns='they',classId='hr';
        if (firstC>=0) firstName=String(row[firstC]||'').trim();
        if (lastC>=0)  lastName =String(row[lastC] ||'').trim();
        if (!firstName&&!lastName) {
          const raw=String(row[nameC>=0?nameC:0]||'').trim();
          if (!raw) return;
          const pts=raw.split(/\s+/);
          firstName=pts[0]; lastName=pts.slice(1).join(' ');
        }
        if (!firstName) return;
        if (pronC>=0) {
          const pv=String(row[pronC]||'').toLowerCase();
          if (pv.includes('she')||pv.includes('her')) pronouns='she';
          else if (pv.includes('he')||pv.includes('him')) pronouns='he';
          else pronouns='they';
        }
        if (classColIdx>=0) {
          const cv=String(row[classColIdx]||'').toLowerCase().trim();
          if (cv.includes('switch')||cv==='sw') classId='sw';
          else classId='hr';
        }
        if (students.find(s=>s.firstName===firstName&&s.lastName===lastName)) return;
        const sid=genId();
        students.push({id:sid,firstName,lastName,pronouns,classId});
        initStudent(sid);
        Object.entries(profCols).forEach(([subKey,ci])=>{
          const raw=String(row[ci]||'').trim().toLowerCase();
          const pf=PMAP[raw];
          if (pf&&comments[sid]?.[subKey]) comments[sid][subKey].proficiency=pf;
        });
        added++;
      });
      save(); renderStudentList();
      alert(`Imported ${added} student${added===1?'':'s'}${Object.keys(profCols).length?' with proficiency data':''}.`);
    } catch(err){ alert('Could not read file: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

// ── Excel Template Download ────────────────────────────────────────────────────
function dlTemplate() {
  const heads = ['First Name','Last Name','Pronouns (he/she/they)','Class (Homeroom/Switch)',
    'ELA Reading','ELA Writing','ELA Oral','Math','Social Studies','French','PHE'];
  const note  = ['Enter first name','Enter last name','he, she, or they','Homeroom or Switch',
    '↓ Enter E, D, P, or Ex for each subject ↓','','','','','',''];
  const ex1   = ['Jordan','Smith','they','Homeroom','P','P','D','P','D','P','P'];
  const ex2   = ['Alex','Johnson','she','Switch','','','','','P','D',''];
  const ws    = XLSX.utils.aoa_to_sheet([heads,note,ex1,ex2]);
  ws['!cols'] = heads.map((_,i)=>({wch:i<4?18:12}));
  const wb    = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Class Roster');
  XLSX.writeFile(wb,'Grade7_Roster_Template.xlsx');
}

// ── Word Export ────────────────────────────────────────────────────────────────
const SUB_ORDER = ['ela_reading','ela_writing','ela_oral','math','ss','french','phe'];
const SUB_NAMES = {
  ela_reading:'ELA 7 — Reading', ela_writing:'ELA 7 — Writing', ela_oral:'ELA 7 — Oral Language',
  math:'Math 7', ss:'Social Studies 7', french:'French 7', phe:'Physical & Health Education 7',
  _pg:'Progress & Growth',
};

function getFullComment(sid, key) {
  initStudent(sid);
  if (key==='_pg') {
    const c = comments[sid]?.['_pg']||{};
    return c.customText||assemblePG(sid);
  }
  const c   = comments[sid]?.[key]||{};
  const sub = SUB[key];
  if (!sub) return '';
  const comps = (c.competencies||[]);
  const narrative = c.customText||assembleSubjectComment(sid,key);
  if (!narrative.trim()&&!comps.length) return '';
  const compLines = comps.map(comp=>`(Curricular Competency) ${comp}`).join('\n');
  return [compLines, narrative].filter(Boolean).join('\n\n');
}

function wrapDoc(bodyHtml) {
  return `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">
<head><meta charset="utf-8">
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Normal</w:View></w:WordDocument></xml><![endif]-->
<style>@page{margin:1in}body{font-family:Calibri,sans-serif;font-size:11pt}h1{font-size:14pt;font-weight:bold}h2{font-size:12pt;font-weight:bold}h3{font-size:11pt;font-weight:bold}p{font-size:11pt;line-height:1.6;margin:0 0 6pt}hr{border:none;border-top:1pt solid #ccc;margin:10pt 0}</style>
</head><body>${bodyHtml}</body></html>`;
}

function buildByStudent(targetStudents) {
  let body='';
  targetStudents.forEach((s,si)=>{
    initStudent(s.id);
    const pb = si>0?'page-break-before:always;':'';
    body+=`<div style="${pb}margin-bottom:20pt">`;
    body+=`<h1 style="font-size:14pt;color:#1e3a6e;border-bottom:1.5pt solid #1e3a6e;padding-bottom:4pt;margin-bottom:10pt">${esc(s.firstName+' '+s.lastName)} <span style="font-size:10pt;color:#6b7280;font-weight:normal">${esc(getClass(s.classId||'hr').name)}</span></h1>`;
    [...SUB_ORDER,'_pg'].forEach(key=>{
      const text=getFullComment(s.id,key);
      if (!text.trim()) return;
      const c  =comments[s.id]?.[key]||{};
      const pf =c.proficiency;
      const pc =pf?` <span style="color:${PROF_COL[pf]}">${PROF[pf]}</span>`:'';
      body+=`<div style="margin-bottom:12pt">`;
      body+=`<h2 style="font-size:11pt;color:#374151;margin-bottom:3pt">${SUB_NAMES[key]||key}${pc}</h2>`;
      body+=`<p style="white-space:pre-wrap">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;
      body+=`</div>`;
    });
    body+=`</div>`;
  });
  return wrapDoc(body);
}

function buildBySubject(targetStudents) {
  let body='';
  [...SUB_ORDER,'_pg'].forEach((key,ki)=>{
    // Collect all students who have content for this key
    const entries = targetStudents.map(s=>{
      initStudent(s.id);
      const subs = classSubjects(s.classId||'hr');
      const subj = key==='_pg'?true:key.startsWith('ela')?subs.includes('ela'):subs.includes(key);
      if (!subj) return null;
      const text = getFullComment(s.id,key);
      if (!text.trim()) return null;
      return {s, text, prof: comments[s.id]?.[key]?.proficiency};
    }).filter(Boolean);
    if (!entries.length) return;

    const pb = ki>0?'page-break-before:always;':'';
    body+=`<div style="${pb}margin-bottom:20pt">`;
    body+=`<h1 style="font-size:14pt;color:#1e3a6e;border-bottom:2pt solid #1e3a6e;padding-bottom:4pt;margin-bottom:12pt">${SUB_NAMES[key]||key}</h1>`;
    entries.forEach(({s,text,prof})=>{
      const pc = prof?` — <span style="color:${PROF_COL[prof]}">${PROF[prof]}</span>`:'';
      body+=`<div style="margin-bottom:14pt;padding:10pt 12pt;border:1pt solid #e4e7ec;border-radius:4pt">`;
      body+=`<h2 style="font-size:11pt;color:#374151;margin-bottom:5pt">${esc(s.firstName+' '+s.lastName)}${pc} <span style="font-size:9pt;color:#9ca3af;font-weight:normal">${esc(getClass(s.classId||'hr').name)}</span></h2>`;
      body+=`<p style="white-space:pre-wrap">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;
      body+=`</div>`;
    });
    body+=`</div>`;
  });
  return wrapDoc(body);
}

function exportStudent() {
  if (!activeId) return alert('Select a student first.');
  const s    = getStudent(activeId);
  const html = buildByStudent([s]);
  const blob = new Blob(['﻿',html],{type:'application/vnd.ms-word;charset=utf-8'});
  saveAs(blob,`${s.lastName}_${s.firstName}_ReportCard.doc`);
}

function exportAll(mode) {
  if (!students.length) return alert('No students to export.');
  const html = mode==='subject' ? buildBySubject(students) : buildByStudent(students);
  const blob = new Blob(['﻿',html],{type:'application/vnd.ms-word;charset=utf-8'});
  saveAs(blob,mode==='subject'?'Grade7_BySubject.doc':'Grade7_ByStudent.doc');
}
