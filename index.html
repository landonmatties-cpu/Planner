<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fc;
      --surface: #ffffff;
      --border: #e4e7ec;
      --text: #111827;
      --muted: #9ca3af;
      --primary: #4a6cf7;
      --primary-dark: #3a5ce5;
      --primary-light: #eef2ff;
      --header-h: 56px;
      --dow-h: 34px;
      --b1: #4361ee; --b1-light: #eef1fe; --b1-text: #1e3a8a;
      --b2: #0ea5e9; --b2-light: #e0f2fe; --b2-text: #075985;
      --b3: #10b981; --b3-light: #d1fae5; --b3-text: #065f46;
      --b4: #f59e0b; --b4-light: #fef3c7; --b4-text: #78350f;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Header ── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: relative; z-index: 5;
    }
    .logo { font-size: 1.05rem; font-weight: 700; color: var(--primary); }
    .nav { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      border-radius: 7px; padding: 5px 12px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: background 0.12s;
    }
    .nav-btn:hover { background: var(--bg); }
    .nav-arrow { padding: 5px 9px; font-size: 1rem; }
    .month-label { font-size: 1rem; font-weight: 700; min-width: 175px; text-align: center; }
    .save-badge {
      font-size: 0.75rem; color: var(--muted); padding: 3px 8px;
      opacity: 0; transition: opacity 0.3s;
    }
    .save-badge.show { opacity: 1; }

    /* ── Calendar wrapper ── */
    .cal-wrapper {
      height: calc(100vh - var(--header-h));
      display: flex; flex-direction: column; overflow: hidden;
    }
    .cal-dow {
      display: grid; grid-template-columns: repeat(7, 1fr);
      height: var(--dow-h); background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .cal-dow-cell {
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
      border-right: 1px solid var(--border);
    }
    .cal-dow-cell:last-child { border-right: none; }
    .cal-dow-cell.weekend { color: #d1d5db; }

    .cal-scroll { flex: 1; overflow-y: auto; }

    /* ── Rows & cells ── */
    .cal-row { display: grid; grid-template-columns: repeat(7, 1fr); }

    .cal-cell {
      min-height: 110px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 6px 6px 4px;
      cursor: pointer;
      background: var(--surface);
      transition: background 0.1s;
      display: flex; flex-direction: column; gap: 3px;
      position: relative;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: #f3f4f8; }
    .cal-cell.other-month { background: #fafbfc; }
    .cal-cell.other-month .date-num { color: #d1d5db; }
    .cal-cell.today .date-num {
      background: var(--primary); color: #fff;
      border-radius: 50%; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-cell.selected { background: var(--primary-light); }
    .cal-cell.selected .date-num { color: var(--primary); font-weight: 800; }

    .date-num {
      font-size: 0.8rem; font-weight: 600; line-height: 1;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .cell-blocks { display: flex; flex-direction: column; gap: 2px; flex: 1; min-height: 0; }

    .block-chip {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.69rem; line-height: 1; font-weight: 500;
      padding: 2px 5px; border-radius: 4px;
      overflow: hidden; white-space: nowrap;
    }
    .block-chip .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .block-chip .chip-label { overflow: hidden; text-overflow: ellipsis; }
    .block-chip.b1 { background: var(--b1-light); color: var(--b1-text); }
    .block-chip.b2 { background: var(--b2-light); color: var(--b2-text); }
    .block-chip.b3 { background: var(--b3-light); color: var(--b3-text); }
    .block-chip.b4 { background: var(--b4-light); color: var(--b4-text); }
    .block-chip.b1 .dot { background: var(--b1); }
    .block-chip.b2 .dot { background: var(--b2); }
    .block-chip.b3 .dot { background: var(--b3); }
    .block-chip.b4 .dot { background: var(--b4); }
    .block-chip.empty { opacity: 0.28; }

    /* ── Expander (inline row expansion) ── */
    .cal-expander {
      display: none;
      border-top: 2px solid var(--primary);
      border-bottom: 2px solid var(--primary);
      background: var(--primary-light);
      animation: expandIn 0.2s ease;
    }
    .cal-expander.open { display: block; }

    @keyframes expandIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .expander-inner { padding: 18px 16px 20px; }

    .expander-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .expander-date { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .expander-close {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 1rem; padding: 4px 8px; border-radius: 6px;
      transition: background 0.12s, color 0.12s;
    }
    .expander-close:hover { background: #dde3fd; color: var(--text); }

    .expander-blocks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 1000px) { .expander-blocks { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .expander-blocks { grid-template-columns: 1fr; } }

    /* ── Block card (inside expander) ── */
    .block-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    .block-card-top {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
    }
    .block-card.b1 .block-card-top { border-top: 3px solid var(--b1); }
    .block-card.b2 .block-card-top { border-top: 3px solid var(--b2); }
    .block-card.b3 .block-card-top { border-top: 3px solid var(--b3); }
    .block-card.b4 .block-card-top { border-top: 3px solid var(--b4); }

    .block-period-label {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 5px;
    }
    .block-card.b1 .block-period-label { color: var(--b1); }
    .block-card.b2 .block-period-label { color: var(--b2); }
    .block-card.b3 .block-period-label { color: var(--b3); }
    .block-card.b4 .block-period-label { color: var(--b4); }

    .block-title-input {
      width: 100%; border: none; outline: none; background: transparent;
      font-size: 0.92rem; font-weight: 700; color: var(--text);
      font-family: inherit; padding: 0;
    }
    .block-title-input::placeholder { color: #c9cdd4; font-weight: 400; }

    .block-card-body {
      padding: 10px 12px 12px;
      display: flex; flex-direction: column; gap: 8px;
      flex: 1;
    }

    .field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .field-group { display: flex; flex-direction: column; gap: 3px; }
    .field-label {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
    }
    .field-input, .field-ta {
      width: 100%; padding: 5px 8px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.83rem; font-family: inherit; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color 0.14s, background 0.14s;
    }
    .field-input:focus, .field-ta:focus {
      border-color: var(--primary); background: var(--surface);
    }
    .field-ta { resize: vertical; min-height: 60px; }
    .field-ta.short { min-height: 44px; }

    /* ── Section toggle ── */
    .detail-toggle {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; padding: 4px 0;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted);
      user-select: none; border: none; background: none;
      width: 100%; text-align: left;
    }
    .detail-toggle:hover { color: var(--text); }
    .detail-toggle .arrow { transition: transform 0.18s; font-size: 0.65rem; }
    .detail-toggle.open .arrow { transform: rotate(90deg); }
    .detail-section { overflow: hidden; }
    .detail-section.closed { display: none; }
    .detail-fields { display: flex; flex-direction: column; gap: 8px; padding-top: 6px; }

    /* ── Empty state ── */
    .cal-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px;
      color: var(--muted); font-size: 0.85rem; gap: 6px;
      border-bottom: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📚 Lesson Planner</div>
  <div class="nav">
    <button class="nav-btn nav-arrow" onclick="navigate(-1)">‹</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn nav-arrow" onclick="navigate(1)">›</button>
    <button class="nav-btn" onclick="goToday()">Today</button>
  </div>
  <span class="save-badge" id="save-badge">Saved</span>
</header>

<div class="cal-wrapper">
  <div class="cal-dow" id="cal-dow"></div>
  <div class="cal-scroll" id="cal-scroll">
    <!-- rows injected by JS -->
  </div>
</div>

<script>
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const BLOCK_CLS    = ['b1','b2','b3','b4'];
  const BLOCK_LABELS = ['Block 1','Block 2','Block 3','Block 4'];

  // ── State ──────────────────────────────────────────────
  let viewYear, viewMonth;
  let openKey = null; // currently expanded day key
  let saveTimer = null;

  // data: { "YYYY-MM-DD": [ {title,subject,topic,objectives,activities,materials,notes}, ... ] }
  let data = JSON.parse(localStorage.getItem('lp2_data') || '{}');

  // Per-block "detail section open" state (UI only)
  let blockDetailOpen = [false, false, false, false];

  function init() {
    const now = new Date();
    viewYear  = now.getFullYear();
    viewMonth = now.getMonth();
    renderDOW();
    renderCalendar();
  }

  // ── DOW header ─────────────────────────────────────────
  function renderDOW() {
    document.getElementById('cal-dow').innerHTML = DAYS.map((d, i) =>
      `<div class="cal-dow-cell${i===0||i===6?' weekend':''}">${d}</div>`
    ).join('');
  }

  // ── Navigation ─────────────────────────────────────────
  function navigate(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    openKey = null;
    renderCalendar();
  }

  function goToday() {
    const now = new Date();
    viewYear  = now.getFullYear();
    viewMonth = now.getMonth();
    openKey   = null;
    renderCalendar();
  }

  // ── Calendar render ────────────────────────────────────
  function renderCalendar() {
    document.getElementById('month-label').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

    const firstDay  = new Date(viewYear, viewMonth, 1);
    const lastDay   = new Date(viewYear, viewMonth + 1, 0);
    const startOff  = firstDay.getDay();
    const totalDays = startOff + lastDay.getDate();
    const numWeeks  = Math.ceil(totalDays / 7);

    const todayKey  = dateKey(new Date());
    const scroll    = document.getElementById('cal-scroll');
    let html = '';

    for (let w = 0; w < numWeeks; w++) {
      html += `<div class="cal-row">`;
      for (let d = 0; d < 7; d++) {
        const dayOffset = w * 7 + d - startOff;
        const cellDate  = new Date(viewYear, viewMonth, dayOffset + 1);
        const key       = dateKey(cellDate);
        const inMonth   = cellDate.getMonth() === viewMonth;

        let cls = 'cal-cell';
        if (!inMonth)         cls += ' other-month';
        if (key === todayKey) cls += ' today';
        if (key === openKey)  cls += ' selected';

        const blocks = data[key] || null;

        html += `<div class="${cls}" data-key="${key}" onclick="toggleDay('${key}')">`;
        html += `<div class="date-num">${cellDate.getDate()}</div>`;
        html += `<div class="cell-blocks">`;
        for (let b = 0; b < 4; b++) {
          const blk = blocks?.[b];
          const txt = blk?.title || blk?.subject || '';
          if (txt) {
            html += `<div class="block-chip ${BLOCK_CLS[b]}"><span class="dot"></span><span class="chip-label">${escHtml(txt)}</span></div>`;
          } else if (inMonth) {
            html += `<div class="block-chip ${BLOCK_CLS[b]} empty"><span class="dot"></span></div>`;
          }
        }
        html += `</div></div>`;
      }
      html += `</div>`;

      // Expander after this row (shown if openKey is in this week)
      const expanderOpen = openKey && isKeyInWeek(openKey, w);
      html += `<div class="cal-expander${expanderOpen ? ' open' : ''}" id="expander-row-${w}">`;
      if (expanderOpen) html += buildExpanderHTML(openKey);
      html += `</div>`;
    }

    scroll.innerHTML = html;

    // Scroll selected day into view
    if (openKey) {
      const expander = document.querySelector('.cal-expander.open');
      if (expander) expander.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function isKeyInWeek(key, weekIndex) {
    const firstDay = new Date(viewYear, viewMonth, 1);
    const startOff = firstDay.getDay();
    const d        = new Date(key + 'T00:00:00');
    if (d.getFullYear() !== viewYear) return false;
    const mOffset  = (d.getMonth() - viewMonth);
    if (mOffset < -1 || mOffset > 1) return false;
    // compute cell index
    const dMonth   = new Date(viewYear, viewMonth, 1);
    const diff     = Math.round((d - dMonth) / 86400000);
    const cellIdx  = startOff + diff;
    return Math.floor(cellIdx / 7) === weekIndex;
  }

  // ── Toggle day open/close ──────────────────────────────
  function toggleDay(key) {
    if (openKey === key) {
      openKey = null;
    } else {
      openKey = key;
      blockDetailOpen = [false, false, false, false];
      ensureDay(key);
    }
    renderCalendar();
  }

  function closeExpander() {
    openKey = null;
    renderCalendar();
  }

  // ── Expander HTML ──────────────────────────────────────
  function buildExpanderHTML(key) {
    const d = new Date(key + 'T00:00:00');
    const label = d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    const blocks = data[key] || Array.from({length:4}, emptyBlock);

    let html = `<div class="expander-inner">`;
    html += `<div class="expander-header">`;
    html += `<span class="expander-date">${label}</span>`;
    html += `<button class="expander-close" onclick="closeExpander()">✕ Close</button>`;
    html += `</div>`;
    html += `<div class="expander-blocks">`;

    for (let b = 0; b < 4; b++) {
      const blk = blocks[b] || emptyBlock();
      const cls = BLOCK_CLS[b];
      const detailOpen = blockDetailOpen[b];

      html += `<div class="block-card ${cls}">`;
      html += `<div class="block-card-top">`;
      html += `<div class="block-period-label">${BLOCK_LABELS[b]}</div>`;
      html += `<input class="block-title-input" type="text" placeholder="Lesson title…" `;
      html += `value="${escAttr(blk.title)}" `;
      html += `oninput="updateField('${key}',${b},'title',this.value)" />`;
      html += `</div>`;

      html += `<div class="block-card-body">`;
      html += `<div class="field-row-2">`;
      html += fieldInput(key, b, 'subject', blk.subject, 'Subject', 'e.g. Math');
      html += fieldInput(key, b, 'topic',   blk.topic,   'Topic',   'e.g. Fractions');
      html += `</div>`;

      // Detail toggle
      html += `<button class="detail-toggle${detailOpen?' open':''}" onclick="toggleDetail('${key}',${b})">`;
      html += `<span class="arrow">▶</span> Details`;
      html += `</button>`;
      html += `<div class="detail-section${detailOpen?'':' closed'}" id="detail-${b}">`;
      html += `<div class="detail-fields">`;
      html += fieldTextarea(key, b, 'objectives', blk.objectives, 'Objectives', 'What will students be able to do?');
      html += fieldTextarea(key, b, 'activities', blk.activities, 'Activities',  'Planned activities…');
      html += fieldTextarea(key, b, 'materials',  blk.materials,  'Materials',   'Required materials…', 'short');
      html += fieldTextarea(key, b, 'notes',      blk.notes,      'Notes & Reflections', 'How did it go?');
      html += `</div></div>`;

      html += `</div></div>`;
    }

    html += `</div></div>`;
    return html;
  }

  function fieldInput(key, b, field, value, label, placeholder) {
    return `<div class="field-group">
      <div class="field-label">${label}</div>
      <input class="field-input" type="text" placeholder="${placeholder}"
        value="${escAttr(value)}"
        oninput="updateField('${key}',${b},'${field}',this.value)" />
    </div>`;
  }

  function fieldTextarea(key, b, field, value, label, placeholder, extra='') {
    return `<div class="field-group">
      <div class="field-label">${label}</div>
      <textarea class="field-ta${extra?' '+extra:''}" placeholder="${placeholder}"
        oninput="updateField('${key}',${b},'${field}',this.value)">${escHtml(value)}</textarea>
    </div>`;
  }

  // ── Detail section toggle ──────────────────────────────
  function toggleDetail(key, blockIdx) {
    blockDetailOpen[blockIdx] = !blockDetailOpen[blockIdx];
    const section = document.getElementById(`detail-${blockIdx}`);
    const btn = section?.previousElementSibling;
    if (blockDetailOpen[blockIdx]) {
      section?.classList.remove('closed');
      btn?.classList.add('open');
    } else {
      section?.classList.add('closed');
      btn?.classList.remove('open');
    }
  }

  // ── Data updates ───────────────────────────────────────
  function updateField(key, blockIdx, field, value) {
    ensureDay(key);
    data[key][blockIdx][field] = value;
    scheduleSave();

    // Update calendar chip without full re-render (preserve focus)
    if (field === 'title' || field === 'subject') {
      updateChip(key, blockIdx);
    }
  }

  function updateChip(key, blockIdx) {
    const cell = document.querySelector(`.cal-cell[data-key="${key}"]`);
    if (!cell) return;
    const chips = cell.querySelectorAll('.block-chip');
    const chip  = chips[blockIdx];
    if (!chip) return;
    const blk   = data[key]?.[blockIdx];
    const txt   = blk?.title || blk?.subject || '';
    let label   = chip.querySelector('.chip-label');
    if (txt) {
      chip.classList.remove('empty');
      if (!label) {
        chip.innerHTML = `<span class="dot"></span><span class="chip-label">${escHtml(txt)}</span>`;
      } else {
        label.textContent = txt;
      }
    } else {
      chip.classList.add('empty');
      if (label) label.remove();
    }
  }

  // ── Helpers ────────────────────────────────────────────
  function ensureDay(key) {
    if (!data[key]) {
      data[key] = Array.from({length:4}, emptyBlock);
    }
  }

  function emptyBlock() {
    return { title:'', subject:'', topic:'', objectives:'', activities:'', materials:'', notes:'' };
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem('lp2_data', JSON.stringify(data));
      const badge = document.getElementById('save-badge');
      badge.classList.add('show');
      setTimeout(() => badge.classList.remove('show'), 1500);
    }, 500);
  }

  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escAttr(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') { openKey = null; renderCalendar(); } });

  init();
</script>
</body>
</html>
